
spring:
  application:
    name: notification-service

  artemis:
    mode: native
    broker-url: tcp://localhost:61616
    user: artemis
    password: artemis

  jms:
    pub-sub-domain: true  # Enable topic support
    listener:
      auto-startup: true
    cache:
      enabled: true
      session-cache-size: 10
    template:
      default-destination: payment.topic

# Set unique client ID for durable subscriptions
management:
  endpoint:
    jms:
      enabled: true

server:
  port: 8082

logging:
  level:
    org.springframework.jms: INFO
    org.apache.activemq.artemis: INFO
    com.example.notification: DEBUG

